<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="AI Quick Translate logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="55%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#d44a00"/>
    </linearGradient>
    <linearGradient id="glassA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bubbleL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1e2"/>
    </linearGradient>
    <linearGradient id="bubbleR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1630"/>
      <stop offset="100%" stop-color="#3a2860"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Rounded squircle background -->
  <rect x="8" y="8" width="224" height="224" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Inner highlight -->
  <rect x="8" y="8" width="224" height="224" rx="56" ry="56" fill="url(#shine)"/>

  <!-- Soft halo behind bubbles -->
  <ellipse cx="120" cy="138" rx="84" ry="56" fill="#000" opacity="0.18" filter="url(#soft)"/>

  <!-- Left bubble: source language (Latin "A") -->
  <g transform="translate(46 64)">
    <path d="M0 28 C0 12.5 12.5 0 28 0 H82 C97.5 0 110 12.5 110 28 V58 C110 73.5 97.5 86 82 86 H46 L24 104 V86 H28 C12.5 86 0 73.5 0 58 Z"
          fill="url(#bubbleL)"
          stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
    <text x="55" y="58" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-weight="900" font-size="50" fill="#ff6a00" letter-spacing="-1">A</text>
  </g>

  <!-- Right bubble: target language (Arabic "ت" — common translation example glyph) -->
  <g transform="translate(84 110)">
    <path d="M110 28 C110 12.5 97.5 0 82 0 H28 C12.5 0 0 12.5 0 28 V58 C0 73.5 12.5 86 28 86 H64 L86 104 V86 H82 C97.5 86 110 73.5 110 58 Z"
          fill="url(#bubbleR)"
          stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="55" y="62" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-weight="900" font-size="56" fill="#ffffff" letter-spacing="-1">文</text>
  </g>

  <!-- Translation arrow connecting the two bubbles -->
  <g transform="translate(110 138)" opacity="0.95">
    <circle r="14" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <path d="M -6 -3 H 5 L 2 -6 M 6 3 H -5 L -2 6"
          fill="none" stroke="#ff6a00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top-right sparkle (the "AI quick" hint) -->
  <g transform="translate(184 56)" fill="#fff8ec">
    <path d="M0 -14 L3 -3 L14 0 L3 3 L0 14 L-3 3 L-14 0 L-3 -3 Z" opacity="0.95"/>
  </g>
  <g transform="translate(206 88)" fill="#fff8ec">
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" opacity="0.85"/>
  </g>
  <g transform="translate(48 200)" fill="#fff8ec">
    <path d="M0 -5 L1.2 -1.2 L5 0 L1.2 1.2 L0 5 L-1.2 1.2 L-5 0 L-1.2 -1.2 Z" opacity="0.8"/>
  </g>

  <!-- Glass highlight strip across the top -->
  <path d="M40 24 H200 C220 24 224 28 224 48 V72
           C180 56 120 50 60 60 C42 64 28 70 16 78 V48 C16 28 20 24 40 24 Z"
        fill="url(#glassA)" opacity="0.6"/>
</svg>
